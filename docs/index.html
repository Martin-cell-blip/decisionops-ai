<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="DecisionOps AI — evidence-grounded settlement and merchant growth agents on real Olist data, with human approval gates. 证据驱动的业务决策 Agent，运行在真实电商数据上。">
  <title>DecisionOps AI — Decisions, with receipts · 决策，笔笔有据</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,900;1,9..144,600&family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2317251f'/%3E%3Ctext x='50' y='68' font-size='52' text-anchor='middle' fill='%23d6ea7c' font-family='Georgia'%3E☑%3C/text%3E%3C/svg%3E">
</head>
<body>

<nav class="topbar">
  <div class="shell">
    <div class="wordmark">Decision<em>Ops</em> AI</div>
    <div class="topnav">
      <a href="#data" data-i="nav.data"></a>
      <a href="#explorer" data-i="nav.explorer"></a>
      <a href="#workbench" data-i="nav.workbench"></a>
      <a href="#byod" data-i="nav.byod"></a>
      <a href="#method" data-i="nav.method"></a>
      <a href="#research" data-i="nav.research"></a>
    </div>
    <div class="langsw">
      <button data-lang="zh">中文</button><button data-lang="en">EN</button>
    </div>
  </div>
</nav>

<header class="hero">
  <div class="shell">
    <div class="grid">
      <div>
        <div class="kicker" data-i="hero.kicker"></div>
        <h1 class="masthead"><span data-i="hero.title1"></span><span class="row2" data-i="hero.title2"></span></h1>
        <p class="lede" data-i="hero.lede"></p>
        <div class="hero-actions">
          <a class="btn primary" href="#explorer" data-i="hero.cta1"></a>
          <a class="btn" href="#byod" data-i="hero.cta2"></a>
          <a class="btn" href="https://github.com/Martin-cell-blip/decisionops-ai" data-i="hero.cta3"></a>
        </div>
      </div>
      <aside class="ledger-card">
        <div class="lbl" data-i="card.lbl"></div>
        <strong class="big num">200/200</strong>
        <small data-i="card.sub"></small>
        <dl class="num">
          <dt data-i="card.r1"></dt><dd>140</dd>
          <dt data-i="card.r2"></dt><dd>60</dd>
          <dt data-i="card.r3"></dt><dd>6/6</dd>
          <dt data-i="card.r4"></dt><dd>24</dd>
          <dt data-i="card.r5"></dt><dd>30</dd>
        </dl>
      </aside>
    </div>
    <div class="statband rv">
      <div><strong class="num" id="stat-lines">—</strong><span data-i="stat.lines"></span></div>
      <div><strong class="num" id="stat-gmv">—</strong><span data-i="stat.gmv"></span></div>
      <div><strong class="num" id="stat-sellers">—</strong><span data-i="stat.sellers"></span></div>
      <div><strong class="num" id="stat-reviews">—</strong><span data-i="stat.reviews"></span></div>
    </div>
  </div>
</header>

<section class="sec" id="loop">
  <div class="shell">
    <div class="sec-head rv">
      <span class="sec-no">00</span>
      <h2 data-i="loop.h"></h2>
      <p data-i="loop.p"></p>
    </div>
    <div class="loop rv">
      <article><b>01</b><strong data-i="loop.1t"></strong><span data-i="loop.1d"></span></article>
      <article><b>02</b><strong data-i="loop.2t"></strong><span data-i="loop.2d"></span></article>
      <article><b>03</b><strong data-i="loop.3t"></strong><span data-i="loop.3d"></span></article>
      <article><b>04</b><strong data-i="loop.4t"></strong><span data-i="loop.4d"></span></article>
      <article><b>05</b><strong data-i="loop.5t"></strong><span data-i="loop.5d"></span></article>
    </div>
  </div>
</section>

<section class="sec" id="data">
  <div class="shell">
    <div class="sec-head rv">
      <span class="sec-no">01</span>
      <h2 data-i="sec1.h"></h2>
      <p data-i="sec1.p"></p>
    </div>
    <div class="chartrow rv">
      <div class="panel"><h3 data-i="chart.trend.h"></h3><p class="sub" data-i="chart.trend.sub"></p><div id="c-trend"></div></div>
      <div class="panel"><h3 data-i="chart.cat.h"></h3><p class="sub" data-i="chart.cat.sub"></p><div id="c-cat"></div></div>
    </div>
    <div class="chartrow2 rv">
      <div class="panel"><h3 data-i="chart.rev.h"></h3><p class="sub" data-i="chart.rev.sub"></p><div id="c-rev"></div></div>
      <div class="panel"><h3 data-i="chart.anom.h"></h3><p class="sub" data-i="chart.anom.sub"></p><div id="c-anom"></div></div>
    </div>
    <div class="prov-legend rv">
      <span data-i="prov.legend"></span>
      <span><span class="prov real">REAL</span> <span data-i="prov.real"></span></span>
      <span><span class="prov proxy">PROXY</span> <span data-i="prov.proxy"></span></span>
      <span><span class="prov assumption">ASSUMED</span> <span data-i="prov.assumption"></span></span>
      <span><span class="prov synthetic">SYNTH</span> <span data-i="prov.synthetic"></span></span>
    </div>
  </div>
</section>

<section class="sec" id="explorer">
  <div class="shell">
    <div class="sec-head rv">
      <span class="sec-no">02</span>
      <h2 data-i="sec2.h"></h2>
      <p data-i="sec2.p"></p>
    </div>
    <div class="tool rv">
      <div class="side">
        <div class="field"><label data-i="explorer.pick"></label></div>
        <div class="list" id="m-list"></div>
        <p class="mono" id="m-meta" style="font-size:11px;color:var(--muted);margin-top:10px"></p>
      </div>
      <div>
        <div class="field"><label data-i="explorer.queue"></label></div>
        <div id="m-queue"></div>
        <div class="chartrow2" style="margin-top:6px">
          <div class="panel"><h3 style="font-size:16px" data-i="explorer.gmvshare"></h3><div id="m-gmv"></div></div>
          <div class="panel" style="overflow-x:auto"><h3 style="font-size:16px" data-i="explorer.skus"></h3><div id="m-skus" style="margin-top:10px"></div></div>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="sec" id="workbench">
  <div class="shell">
    <div class="sec-head rv">
      <span class="sec-no">03</span>
      <h2 data-i="sec3.h"></h2>
      <p data-i="sec3.p"></p>
    </div>
    <div class="queue rv">
      <div><strong class="num" id="q-pending">—</strong><span data-i="q.pending"></span></div>
      <div><strong class="num" id="q-approved">—</strong><span data-i="q.approved"></span></div>
      <div><strong class="num" id="q-rejected">—</strong><span data-i="q.rejected"></span></div>
      <button class="mini" id="q-reset" data-i="q.reset"></button>
    </div>
    <div class="tool rv">
      <div class="side">
        <div class="field">
          <label data-i="wb.filter"></label>
          <select id="c-filter">
            <option value="ALL">All / 全部</option>
            <option value="MATCH">MATCH</option>
            <option value="DUPLICATE">DUPLICATE</option>
            <option value="AMOUNT_MISMATCH">AMOUNT_MISMATCH</option>
            <option value="MISSING_ORDER">MISSING_ORDER</option>
            <option value="NOT_DELIVERED">NOT_DELIVERED</option>
          </select>
        </div>
        <div class="field"><label data-i="wb.cases"></label></div>
        <div class="list" id="c-list"></div>
      </div>
      <div class="rec open" id="c-detail" style="background:#fff;border:1px solid var(--hair2)"></div>
    </div>
  </div>
</section>

<section class="sec" id="byod">
  <div class="shell">
    <div class="sec-head rv">
      <span class="sec-no">04</span>
      <h2 data-i="sec4.h"></h2>
      <p data-i="sec4.p"></p>
    </div>
    <div class="byod-note rv" data-i="byod.note"></div>
    <div class="chartrow2 rv">
      <div class="panel">
        <h3 data-i="byod.growth.h"></h3>
        <p class="sub" data-i="byod.growth.d"></p>
        <div class="drop" id="drop-growth"><span data-i="byod.choose"></span><input type="file" id="file-growth" accept=".csv,text/csv"></div>
        <p style="margin:12px 0 0"><button class="mini" id="tpl-growth" data-i="byod.template"></button></p>
        <div id="byod-growth-out" style="margin-top:16px"></div>
      </div>
      <div class="panel">
        <h3 data-i="byod.settle.h"></h3>
        <p class="sub" data-i="byod.settle.d"></p>
        <div class="drop" id="drop-settle"><span data-i="byod.choose"></span><input type="file" id="file-settle" accept=".csv,text/csv"></div>
        <p style="margin:12px 0 0"><button class="mini" id="tpl-settle" data-i="byod.template"></button></p>
        <div id="byod-settle-out" style="margin-top:16px"></div>
      </div>
    </div>
  </div>
</section>

<section class="sec" id="method">
  <div class="shell">
    <div class="sec-head rv">
      <span class="sec-no">05</span>
      <h2 data-i="sec5.h"></h2>
      <p data-i="sec5.p"></p>
    </div>
    <div class="hcards rv">
      <article><div class="n num">20/60</div><h4 data-i="m1.h"></h4><p data-i="m1.p"></p></article>
      <article><div class="n num">6/6</div><h4 data-i="m2.h"></h4><p data-i="m2.p"></p></article>
      <article><div class="n num">&lt;30</div><h4 data-i="m3.h"></h4><p data-i="m3.p"></p></article>
    </div>
    <div class="warnbox rv" data-i="m.warn"></div>
  </div>
</section>

<section class="sec" id="research">
  <div class="shell">
    <div class="sec-head rv">
      <span class="sec-no">06</span>
      <h2 data-i="sec6.h"></h2>
      <p data-i="sec6.p"></p>
    </div>
    <div class="hcards rv">
      <article><div class="n num">12</div><p data-i="r1.d"></p></article>
      <article><div class="n num">30</div><p data-i="r2.d"></p></article>
      <article><div class="n num">0</div><p data-i="r3.d"></p></article>
    </div>
  </div>
</section>

<footer>
  <div class="shell cols">
    <span class="mark">Decision<em style="font-style:normal;color:var(--green)">Ops</em> AI · 2026</span>
    <span data-i="footer.line"></span>
  </div>
</footer>

<script src="assets/app.js"></script>
</body>
</html>
